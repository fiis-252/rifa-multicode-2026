<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Rifa Multicódigo FIIS</title>
  <link rel="stylesheet" href="/src/css/global.css">
</head>
<body>
  <main class="text-center">
    <header class="card">
      <h1>Gran Rifa Multicódigo FIIS</h1>
      <p>Códigos Participantes: 24-2 | 25-1 | 25-2</p>
    </header>

    <section id="countdown-container">
      <h2>Faltan para el sorteo (Semana 14):</h2>
      <h1 id="countdown-timer">00d 00h 00m 00s</h1>
    </section>

    <section id="purchase-action">
      <h2>¿Quieres apoyar y participar?</h2>
      <p>Haz clic abajo para contactar a un tesorero al azar y comprar tu boleto virtual.</p>
      <button id="btn-buy-random">Comprar Boleto Ahora</button>
    </section>
    
    <div style="margin-top: 2rem;">
      <a href="/login" style="color: var(--color-primary); text-decoration: none; font-size: 0.9rem;">
        Acceso para Vendedores (Delegados/Alumnos)
      </a>
    </div>
  </main>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
