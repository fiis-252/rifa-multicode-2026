<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Rifa Multicódigo 2026</title>
  <link rel="stylesheet" href="/src/css/global.css">
</head>
<body>
  <main class="auth-container">
    <h2>Ingreso de Vendedores</h2>
    
    <form id="form-request-otp">
      <label for="identifier">Correo Institucional o Código UNI</label>
      <input type="text" id="identifier" required placeholder="example@uni.pe">
      <button type="submit">Solicitar Código de Acceso</button>
    </form>

    <form id="form-verify-otp" style="display: none;">
      <label for="otp">Código OTP Recibido</label>
      <input type="text" id="otp" required placeholder="123456" maxlength="6">
      <button type="submit">Verificar e Ingresar</button>
    </form>
  </main>

  <script type="module" src="/src/js/auth.js"></script>
</body>
</html>
