<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas - Rifa Multicódigo 2026</title>
  <link rel="stylesheet" href="/src/css/global.css">
  <script src="/src/js/router.js"></script>
</head>
<body>
  <header style="justify-content: center; flex: display; flex-direction: column; padding: 4rem;">
    <h1>Dashboard de Registro</h1>
    <button id="btn-logout" style="width: auto;">Cerrar Sesión</button>
  </header>

  <main>
    <section id="payment-routing-zone">
      <h3>Tesorería Asignada</h3>
      <div id="qr-container">
        <p>Cargando información de recaudo...</p>
      </div>
    </section>

    <hr>

    <section id="ticket-registration">
      <h3>Registrar Venta de Boleto</h3>
      <form id="form-sell-ticket">
        <label for="buyer-name">Nombre del Comprador</label>
        <input type="text" id="buyer-name" required>

        <label for="buyer-phone">Teléfono WhatsApp</label>
        <input type="tel" id="buyer-phone" required placeholder="912345678">

        <button type="submit">Confirmar Venta e Imprimir Boleto</button>
      </form>
    </section>
  </main>

  <script type="module" src="/src/js/dashboard.js"></script>
</body>
</html>
