<!doctype html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Boletos - Rifa Multicódigo</title>
    <link rel="stylesheet" href="./src/css/global.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Montserrat:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  </head>
  <body style="display:flex; flex-direction:column; align-items: center; min-height: 100vh;">
    
    <div style="width: 100%; max-width: 600px; display: flex; flex-direction: column; margin-top: 2rem;">
      
      <main class="auth-container">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--theme-primary);">Ver boletos</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem;">
          ¿No te llegó el mensaje de WhatsApp? Ingresa tu numero de celular para descargar tus boletos
        </p>

        <form id="form-search-tickets">
          <label for="search-phone">Numero de Celular</label>
          <input
            type="text"
            id="search-phone"
            required
            placeholder="999888777"
            maxlength="15" />
          <button type="submit" id="btn-search">Buscar Mis Boletos</button>
        </form>
      </main>

      <section id="results-container" style="display: none; background: transparent; border: none; box-shadow: none; padding: 0;">
        <h3 style="text-align: center; margin-bottom: 1rem;" id="results-title"></h3>
        <div id="tickets-grid" style="display: flex; flex-direction: column; gap: 1.5rem;">
            </div>
      </section>

    </div>

    <script type="module" src="./src/js/search.js"></script>
  </body>
</html>
